<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester — UtilShed</title>
    <meta name="description" content="Free online regex tester. Test regular expressions against text in real-time with match highlighting, capture groups, and flags support. No signup required.">
    <meta name="keywords" content="regex tester, regular expression tester, regex online, regex match, regex validator, regex debugger">
    <link rel="canonical" href="https://utilshed.com/tools/regex-tester/">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .flags-row { display: flex; gap: 1rem; align-items: center; margin: 0.75rem 0; flex-wrap: wrap; }
        .flags-row label { display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem; color: var(--text-muted); cursor: pointer; }
        .flags-row input[type="checkbox"] { accent-color: var(--accent); }
        .match-highlight { background: rgba(59,130,246,0.3); border-radius: 2px; padding: 0 1px; }
        .group-highlight { background: rgba(234,179,8,0.25); border-radius: 2px; padding: 0 1px; }
        #test-output { white-space: pre-wrap; word-break: break-word; font-family: var(--mono); font-size: 0.875rem; line-height: 1.6; min-height: 120px; padding: 1rem; }
        #matches-info { font-size: 0.8125rem; color: var(--text-muted); margin-top: 0.5rem; }
        .match-list { margin-top: 0.75rem; }
        .match-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; margin-bottom: 0.375rem; font-family: var(--mono); font-size: 0.8125rem; }
        .match-index { color: var(--text-muted); margin-right: 0.5rem; }
        .match-value { color: var(--accent); }
        .group-label { color: var(--yellow); font-size: 0.75rem; }
        .regex-input-wrapper { display: flex; align-items: center; gap: 0.5rem; }
        .regex-input-wrapper span.delim { color: var(--text-muted); font-family: var(--mono); font-size: 1.25rem; }
        #regex-input { flex: 1; padding: 0.625rem 0.875rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 0.875rem; outline: none; }
        #regex-input:focus { border-color: var(--accent); }
        #regex-input.invalid { border-color: var(--red); }
    </style>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Regex Tester","description":"Free online regex tester. Test regular expressions against text in real-time with match highlighting, capture groups, and flags support. No signup required.","url":"https://utilshed.com/tools/regex-tester/","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"provider":{"@type":"Organization","name":"UtilShed","url":"https://utilshed.com"}}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://utilshed.com/"},{"@type":"ListItem","position":2,"name":"Regex Tester","item":"https://utilshed.com/tools/regex-tester/"}]}</script>
</head>
<body>
    <header>
        <nav>
            <a href="../../" class="logo">🛠️ UtilShed</a>
            <span class="tagline">Regex Tester</span>
        </nav>
    </header>
    <main>
        <div class="tool-header">
            <h1>Regex Tester</h1>
            <p>Test regular expressions against text in real-time with match highlighting.</p>
        </div>
        <div class="tool-single">
            <div style="margin-bottom:0.75rem;font-size:0.875rem;font-weight:600;">Pattern</div>
            <div class="regex-input-wrapper">
                <span class="delim">/</span>
                <input type="text" id="regex-input" placeholder="[a-z]+@[a-z]+\.[a-z]{2,}" spellcheck="false">
                <span class="delim">/</span>
            </div>
            <div class="flags-row">
                <label><input type="checkbox" id="flag-g" checked> <code>g</code> global</label>
                <label><input type="checkbox" id="flag-i"> <code>i</code> case-insensitive</label>
                <label><input type="checkbox" id="flag-m"> <code>m</code> multiline</label>
                <label><input type="checkbox" id="flag-s"> <code>s</code> dotAll</label>
                <span id="regex-error" style="color:var(--red);font-size:0.8125rem;"></span>
            </div>
            <div style="margin-bottom:0.5rem;font-size:0.875rem;font-weight:600;">Test String</div>
            <textarea class="tool-input" id="test-input" style="min-height:150px;background:var(--bg);border:1px solid var(--border);border-radius:8px;" placeholder="Enter text to test against your regex..."></textarea>
            <div id="matches-info"></div>
            <div style="margin-top:1rem;font-size:0.875rem;font-weight:600;">Highlighted Result</div>
            <div id="test-output" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-top:0.375rem;"></div>
            <div style="margin-top:1rem;font-size:0.875rem;font-weight:600;">Matches</div>
            <div id="match-list" class="match-list"></div>
        </div>
    </main>
    <footer><p>Built by <a href="https://github.com/KarlbottAgent">UtilShed</a> — open source, free forever.</p></footer>
    <script>
    const regexInput = document.getElementById('regex-input');
    const testInput = document.getElementById('test-input');
    const testOutput = document.getElementById('test-output');
    const matchList = document.getElementById('match-list');
    const matchesInfo = document.getElementById('matches-info');
    const regexError = document.getElementById('regex-error');
    const flagG = document.getElementById('flag-g');
    const flagI = document.getElementById('flag-i');
    const flagM = document.getElementById('flag-m');
    const flagS = document.getElementById('flag-s');

    function getFlags() {
        let f = '';
        if (flagG.checked) f += 'g';
        if (flagI.checked) f += 'i';
        if (flagM.checked) f += 'm';
        if (flagS.checked) f += 's';
        return f;
    }

    function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function runRegex() {
        const pattern = regexInput.value;
        const text = testInput.value;
        regexError.textContent = '';
        regexInput.classList.remove('invalid');

        if (!pattern || !text) {
            testOutput.innerHTML = escapeHtml(text || '');
            matchList.innerHTML = '';
            matchesInfo.textContent = '';
            return;
        }

        let re;
        try {
            re = new RegExp(pattern, getFlags());
        } catch (e) {
            regexError.textContent = e.message;
            regexInput.classList.add('invalid');
            testOutput.innerHTML = escapeHtml(text);
            matchList.innerHTML = '';
            matchesInfo.textContent = '';
            return;
        }

        // Find all matches
        const matches = [];
        if (re.global) {
            let m;
            while ((m = re.exec(text)) !== null) {
                matches.push({ index: m.index, value: m[0], groups: m.slice(1) });
                if (m[0].length === 0) { re.lastIndex++; }
            }
        } else {
            const m = re.exec(text);
            if (m) {
                matches.push({ index: m.index, value: m[0], groups: m.slice(1) });
            }
        }

        // Highlight in text
        let html = '';
        let lastIdx = 0;
        for (const m of matches) {
            html += escapeHtml(text.slice(lastIdx, m.index));
            html += '<span class="match-highlight">' + escapeHtml(m.value) + '</span>';
            lastIdx = m.index + m.value.length;
        }
        html += escapeHtml(text.slice(lastIdx));
        testOutput.innerHTML = html || escapeHtml(text);

        // Match info
        matchesInfo.textContent = matches.length + ' match' + (matches.length !== 1 ? 'es' : '') + ' found';

        // Match list
        let listHtml = '';
        matches.forEach((m, i) => {
            listHtml += '<div class="match-item">';
            listHtml += '<span class="match-index">#' + (i + 1) + '</span>';
            listHtml += '<span class="match-value">"' + escapeHtml(m.value) + '"</span>';
            listHtml += ' <span style="color:var(--text-muted)">at index ' + m.index + '</span>';
            if (m.groups.length > 0) {
                m.groups.forEach((g, gi) => {
                    if (g !== undefined) {
                        listHtml += '<br><span class="group-label">  Group ' + (gi + 1) + ':</span> ';
                        listHtml += '<span class="match-value">"' + escapeHtml(g) + '"</span>';
                    }
                });
            }
            listHtml += '</div>';
        });
        matchList.innerHTML = listHtml;
    }

    regexInput.addEventListener('input', runRegex);
    testInput.addEventListener('input', runRegex);
    flagG.addEventListener('change', runRegex);
    flagI.addEventListener('change', runRegex);
    flagM.addEventListener('change', runRegex);
    flagS.addEventListener('change', runRegex);
    </script>
    <script data-goatcounter="https://utilshed.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
